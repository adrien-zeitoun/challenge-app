<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Challenges</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Challenges en cours</h1>

  <form id="addForm">
    <input type="text" id="titreInput" placeholder="Nouveau challenge" required>
    <select id="categorieInput">
      <option value="Partout">N'importe où</option>
      <option value="Boxe">Boxe</option>
      <option value="Cuisine">Cuisine</option>
      <option value="Couloir">Couloir</option>
      <option value="Salle de bain">Salle de bain</option>
      <option value="Baignoire">Baignoire</option>
      <option value="Chambre">Chambre</option>
      <option value="Salon">Salon</option>
      <option value="Salle à manger">Salle à manger</option>
    </select>
    <button type="submit">Ajouter</button>
  </form>

  <div class="filterBar">
    <label for="filterSelect">Filtrer :</label>
    <select id="filterSelect">
      <option value="Toutes">Toutes les catégories</option>
      <option value="Partout">N'importe où</option>
      <option value="Boxe">Boxe</option>
      <option value="Cuisine">Cuisine</option>
      <option value="Couloir">Couloir</option>
      <option value="Salle de bain">Salle de bain</option>
      <option value="Baignoire">Baignoire</option>
      <option value="Chambre">Chambre</option>
      <option value="Salon">Salon</option>
      <option value="Salle à manger">Salle à manger</option>
    </select>
  </div>

  <div id="challengeContainer"></div>

  <a href="historique.html">Voir l'historique et les stats</a>

  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      collection, addDoc, query, where, onSnapshot,
      doc, updateDoc, serverTimestamp, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const challengesRef = collection(db, "challenges");
    const container = document.getElementById("challengeContainer");
    const filterSelect = document.getElementById("filterSelect");

    let currentFilter = "Toutes";
    let unsubscribe = null;

    // Mémorise l'état plié/déplié de chaque groupe entre les rafraîchissements
    const collapsedGroups = new Set();

    function renderChallenges(docsArray) {
      container.innerHTML = "";

      if (docsArray.length === 0) {
        container.innerHTML = "<p>Aucun challenge dans cette catégorie.</p>";
        return;
      }

      // Regroupement par catégorie
      const groups = {};
      docsArray.forEach((data) => {
        const cat = data.categorie || "Autre";
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(data);
      });

      const sortedCategories = Object.keys(groups).sort();

      sortedCategories.forEach((cat) => {
        const catClass = cat.replace(/\s+/g, "");
        const isCollapsed = collapsedGroups.has(cat);

        const divider = document.createElement("div");
        divider.className = "groupDivider";
        divider.dataset.cat = cat;
        divider.innerHTML = `
          <span class="groupTitle">${cat}</span>
          <span class="groupCount">${groups[cat].length}</span>
          <span class="groupArrow">${isCollapsed ? "▸" : "▾"}</span>
        `;
        container.appendChild(divider);

        const ul = document.createElement("ul");
        ul.className = "challengeList";
        ul.style.display = isCollapsed ? "none" : "flex";

        groups[cat].forEach((data) => {
          const isAccepted = data.accepted === true;
          const li = document.createElement("li");

          const leftPart = `
            <span class="badge badge-${catClass}">${cat}</span>
            <span class="titreChallenge">${data.titre}</span>
            ${isAccepted
              ? `<span class="badge badge-accepte">✅</span>`
              : `<button class="acceptBtn" data-id="${data.id}">✅</button>
                 <button class="refuseBtn" data-id="${data.id}">❌</button>`
            }
          `;

          const rightPart = `
            <button class="validerBtn" data-id="${data.id}">Valider</button>
            <button class="deleteBtn" data-id="${data.id}">🗑️</button>
          `;

          li.innerHTML = leftPart + rightPart;
          ul.appendChild(li);
        });

        container.appendChild(ul);
      });
    }

    function loadChallenges() {
      if (unsubscribe) unsubscribe();

      const q = query(challengesRef, where("completed", "==", false));

      unsubscribe = onSnapshot(q, (snapshot) => {
        let docsArray = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

        if (currentFilter !== "Toutes") {
          docsArray = docsArray.filter(d => d.categorie === currentFilter);
        }

        renderChallenges(docsArray);
      });
    }

    loadChallenges();

    filterSelect.addEventListener("change", (e) => {
      currentFilter = e.target.value;
      loadChallenges();
    });

    // Clic sur un divider = plier/déplier le groupe
    container.addEventListener("click", (e) => {
      const divider = e.target.closest(".groupDivider");
      if (!divider) return;
      const cat = divider.dataset.cat;
      if (collapsedGroups.has(cat)) {
        collapsedGroups.delete(cat);
      } else {
        collapsedGroups.add(cat);
      }
      const ul = divider.nextElementSibling;
      ul.style.display = collapsedGroups.has(cat) ? "none" : "flex";
      divider.querySelector(".groupArrow").textContent = collapsedGroups.has(cat) ? "▸" : "▾";
    });

    // Délégation d'événements pour les boutons d'action
    container.addEventListener("click", async (e) => {
      const target = e.target;
      const id = target.dataset.id;
      if (!id) return;

      if (target.matches(".validerBtn")) {
        try {
          await updateDoc(doc(db, "challenges", id), {
            completed: true,
            refused: false,
            dateCompletion: serverTimestamp()
          });
        } catch (err) {
          alert("Erreur : " + err.message);
        }
      }

      if (target.matches(".deleteBtn")) {
        const confirmed = confirm("Supprimer définitivement ce challenge ?");
        if (!confirmed) return;
        try {
          await deleteDoc(doc(db, "challenges", id));
        } catch (err) {
          alert("Erreur : " + err.message);
        }
      }

      if (target.matches(".acceptBtn")) {
        try {
          await updateDoc(doc(db, "challenges", id), { accepted: true });
        } catch (err) {
          alert("Erreur : " + err.message);
        }
      }

      if (target.matches(".refuseBtn")) {
        const confirmed = confirm("Marquer ce challenge comme refusé ?");
        if (!confirmed) return;
        try {
          await updateDoc(doc(db, "challenges", id), {
            completed: true,
            refused: true,
            dateCompletion: serverTimestamp()
          });
        } catch (err) {
          alert("Erreur : " + err.message);
        }
      }
    });

    document.getElementById("addForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const titre = document.getElementById("titreInput").value.trim();
      const categorie = document.getElementById("categorieInput").value;
      if (!titre) return;
      await addDoc(challengesRef, {
        titre,
        categorie,
        completed: false,
        refused: false,
        accepted: false,
        dateCreation: serverTimestamp(),
        dateCompletion: null
      });
      document.getElementById("titreInput").value = "";
    });
  </script>
</body>
</html>
